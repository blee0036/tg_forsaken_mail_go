name: Dependency security maintenance

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

concurrency:
  group: dependency-security-maintenance
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  GOVULNCHECK_VERSION: v1.6.0

jobs:
  scan-and-upgrade:
    name: Scan and upgrade vulnerable Go dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: |
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan and apply fixed versions
        id: upgrade
        shell: bash
        run: |
          set -euo pipefail

          report="$RUNNER_TEMP/govulncheck-before.json"
          govulncheck -json ./... > "$report"

          declare -A upgrades=()
          while IFS='@' read -r module version; do
            if [[ -n "$module" && -n "$version" ]]; then
              upgrades["$module"]="$version"
            fi
          done < <(
            jq -r '
              select(.finding != null)
              | .finding as $finding
              | ($finding.trace[0] // {}) as $vulnerable
              | select(
                  ($vulnerable.module // "") != ""
                  and $vulnerable.module != "stdlib"
                  and $vulnerable.module != "go-version-rewrite"
                  and ($finding.fixed_version // "") != ""
                )
              | "\($vulnerable.module)@\($finding.fixed_version)"
            ' "$report" | sort -t@ -k1,1 -k2,2V
          )

          for module in "${!upgrades[@]}"; do
            echo "Upgrading $module to ${upgrades[$module]}"
            go get "$module@${upgrades[$module]}"
          done

          stdlib_fix="$({
            jq -r '
              select(.finding != null)
              | .finding as $finding
              | select(
                  (($finding.trace[0].module // "") == "stdlib")
                  and (($finding.fixed_version // "") != "")
                )
              | $finding.fixed_version
            ' "$report" | sed 's/^v//' | sort -V | tail -n 1
          } || true)"

          if [[ -n "$stdlib_fix" ]]; then
            echo "Upgrading the Go toolchain requirement to $stdlib_fix"
            go mod edit -go="$stdlib_fix"
            export GOTOOLCHAIN="go${stdlib_fix}+auto"
            echo "GOTOOLCHAIN=go${stdlib_fix}+auto" >> "$GITHUB_ENV"
          fi

          go mod tidy

          if git diff --quiet -- go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests after upgrades
        if: steps.upgrade.outputs.changed == 'true'
        run: go test -count=1 ./...

      - name: Verify vulnerabilities are fixed
        run: govulncheck ./...

      - name: Create dependency security pull request
        if: steps.upgrade.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/dependency-security-updates
          delete-branch: true
          add-paths: |
            go.mod
            go.sum
          commit-message: 'chore(deps): upgrade vulnerable Go dependencies'
          title: 'chore(deps): upgrade vulnerable Go dependencies'
          body: |
            Automated security maintenance generated by `govulncheck`.

            The workflow applies the fixed versions reported by the Go vulnerability database, runs the full test suite, and verifies the updated dependency graph before opening this PR.
